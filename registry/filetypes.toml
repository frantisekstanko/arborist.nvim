# Neovim Filetype → Parser Mappings
#
# Maps Neovim filetype names to tree-sitter parser names.
# Only needed when the filetype differs from the parser name.
# For example, Neovim's 'sh' filetype uses the 'bash' parser.
#
# Format: parser_name = ["filetype1", "filetype2", ...]
#
# Initially seeded from nvim-treesitter (Apache-2.0). Now maintained independently.

[filetypes]
angular = ["htmlangular"]
bash = ["sh", "zsh"]
bibtex = ["bib"]
c_sharp = ["cs", "csharp"]
commonlisp = ["lisp"]
cooklang = ["cook"]
devicetree = ["dts"]
diff = ["gitdiff"]
eex = ["eelixir"]
elixir = ["ex"]
embedded_template = ["eruby"]
erlang = ["erl"]
facility = ["fsd"]
faust = ["dsp"]
gdshader = ["gdshaderinc"]
git_config = ["gitconfig"]
git_rebase = ["gitrebase"]
glimmer = ["handlebars", "html.handlebars"]
glimmer_javascript = ["javascript.glimmer"]
glimmer_typescript = ["typescript.glimmer"]
godot_resource = ["gdresource"]
haskell = ["hs"]
haskell_persistent = ["haskellpersistent"]
idris = ["idris2"]
ini = ["confini", "dosini"]
janet_simple = ["janet"]
javascript = ["ecma", "ecmascript", "javascriptreact", "js", "jsx"]
json = ["jsonc"]
latex = ["plaintex", "tex"]
linkerscript = ["ld"]
m68k = ["asm68k"]
make = ["automake"]
markdown = ["pandoc"]
muttrc = ["neomuttrc"]
ocaml_interface = ["ocamlinterface"]
perl = ["pl"]
poe_filter = ["poefilter"]
powershell = ["ps1"]
properties = ["jproperties"]
python = ["gyp", "py"]
qmljs = ["qml"]
runescript = ["clientscript"]
scala = ["sbt"]
slang = ["shaderslang"]
ssh_config = ["sshconfig"]
starlark = ["bzl"]
surface = ["sface"]
systemverilog = ["verilog"]
t32 = ["trace32"]
tcl = ["expect"]
terraform = ["terraform-vars"]
textproto = ["pbtxt"]
tlaplus = ["tla"]
tsx = ["typescript.tsx", "typescriptreact"]
typescript = ["ts"]
typst = ["typ"]
udev = ["udevrules"]
uxntal = ["tal", "uxn"]
v = ["vlang"]
vhs = ["tape"]
xml = ["svg", "xsd", "xslt"]
xresources = ["xdefaults"]
