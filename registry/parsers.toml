# Tree-sitter Parser Registry
#
# A mapping of parser names to their source repositories.
# This file is editor-agnostic. Any tool that needs to find,
# download, or compile tree-sitter parsers can use it.
#
# Fields:
#   url       Git repository containing the parser grammar
#   location  Subdirectory within the repo (for mono-repos)
#
# 326 parsers
# Initially seeded from nvim-treesitter (Apache-2.0). Now maintained independently.

